document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

in:0 auto\">\n\n    <!-- HEADER -->\n    <div style=\"background:linear-gradient(180deg,#ffffff,#fbfaf6);border:1px solid rgba(42,44,58,0.1);border-radius:22px;padding:26px 30px;box-shadow:0 1px 2px rgba(30,30,60,.04),0 20px 40px -30px rgba(30,30,60,.4);display:flex;align-items:center;gap:22px\">\n      <div style=\"flex:none;width:76px;height:76px;border-radius:20px;background:linear-gradient(150deg,#3a8fdd,#2565b0);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Bricolage Grotesque';font-weight:800;font-size:38px;box-shadow:0 12px 24px -12px rgba(37,101,176,.7)\">01<\/div>\n      <div style=\"flex:1;min-width:0\">\n        <div style=\"font-size:12.5px;letter-spacing:.14em;text-transform:uppercase;color:#8a8776;font-weight:700\">Outlook \u00b7 Student's Book \u00b7 Tronc Commun<\/div>\n        <h1 style=\"margin:3px 0 4px;font-family:'Bricolage Grotesque';font-weight:700;font-size:34px;line-height:1.02;color:#20222e\">Myself &amp; Others<\/h1>\n        <div style=\"color:#6a6d80;font-size:15px\">An interactive lesson \u2014 read, listen, and complete the exercises. Answers grade instantly.<\/div>\n      <\/div>\n    <\/div>\n\n    <!-- TABS -->\n    <div style=\"display:flex;flex-wrap:wrap;gap:10px;margin:22px 0 20px\">\n      <sc-for list=\"{{ tabs }}\" as=\"t\" hint-placeholder-count=\"4\">\n        <button onclick=\"{{ t.onClick }}\" style=\"{{ t.style }}\">\n          <span style=\"width:9px;height:9px;border-radius:50%;background:{{ t.dot }}\"><\/span>{{ t.label }}\n        <\/button>\n      <\/sc-for>\n    <\/div>\n\n    <!-- ============ CONVERSATION ============ -->\n    <div data-screen-label=\"Conversation\" style=\"{{ convDisp }}\">\n      <div style=\"display:flex;align-items:baseline;gap:10px;margin-bottom:14px\">\n        <h2 style=\"font-family:'Bricolage Grotesque';font-weight:700;font-size:23px;margin:0;color:#20222e\">Conversation<\/h2>\n        <span style=\"color:#2f7fd1;font-weight:700;font-size:14px\">Hello!<\/span>\n      <\/div>\n\n      <!-- Dialogue 1 -->\n      <div style=\"background:#fff;border:1px solid rgba(42,44,58,.1);border-left:5px solid #2f7fd1;border-radius:16px;padding:22px 24px;box-shadow:0 1px 2px rgba(30,30,60,.04),0 12px 30px -24px rgba(30,30,60,.4);margin-bottom:18px\">\n        <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:14px\">\n          <span style=\"flex:none;width:26px;height:26px;border-radius:8px;background:#2f7fd1;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:14px\">1<\/span>\n          <span style=\"font-weight:700;font-size:15px\">Listen and practise.<\/span>\n          <span style=\"color:#8a8ea0;font-size:13.5px;font-style:italic\">Nora, Meg and Robert are in the schoolyard.<\/span>\n        <\/div>\n        <sc-for list=\"{{ dialogueHello }}\" as=\"ln\" hint-placeholder-count=\"6\">\n          <div style=\"display:grid;grid-template-columns:82px 1fr;gap:12px;padding:4px 0\">\n            <div style=\"font-weight:700;color:#2f7fd1;font-size:14.5px\">{{ ln.speaker }}<\/div>\n            <div style=\"line-height:1.5;font-size:15px\">{{ ln.text }}<\/div>\n          <\/div>\n        <\/sc-for>\n      <\/div>\n\n      <!-- Ex 2: correct false -->\n      <div style=\"background:#fff;border:1px solid rgba(42,44,58,.1);border-radius:16px;padding:22px 24px;box-shadow:0 1px 2px rgba(30,30,60,.04),0 12px 30px -24px rgba(30,30,60,.4);margin-bottom:18px\">\n        <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:6px\">\n          <span style=\"flex:none;width:26px;height:26px;border-radius:8px;background:#2f7fd1;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:14px\">2<\/span>\n          <span style=\"font-weight:700;font-size:15px\">Comprehension check \u2014 correct the false information.<\/span>\n        <\/div>\n        <p style=\"margin:2px 0 16px 36px;color:#6a6d80;font-size:13.5px\">Each sentence has one wrong word. Choose the correct replacement.<\/p>\n        <sc-for list=\"{{ convFalse.items }}\" as=\"it\" hint-placeholder-count=\"5\">\n          <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:10px 12px;padding:10px 0;border-top:1px solid rgba(42,44,58,.07)\">\n            <span style=\"flex:1;min-width:230px;font-size:15px\">\u201c{{ it.wrong }}\u201d<\/span>\n            <span style=\"color:#8a8ea0;font-size:13.5px\">Correct word:<\/span>\n            <select value=\"{{ it.value }}\" onchange=\"{{ it.onChange }}\" style=\"font-size:14.5px;padding:7px 10px;border:1.5px solid rgba(42,44,58,.18);border-radius:9px;background:#fff;color:#2a2c3a\">\n              <option value=\"\">\u2014<\/option>\n              <sc-for list=\"{{ it.options }}\" as=\"o\"><option value=\"{{ o.v }}\">{{ o.label }}<\/option><\/sc-for>\n            <\/select>\n            <span style=\"{{ it.markStyle }}\">{{ it.mark }}<\/span>\n            <sc-if value=\"{{ it.showAns }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"color:#2e9e6b;font-weight:700;font-size:14px\">\u2192 {{ it.answer }}<\/span><\/sc-if>\n          <\/div>\n        <\/sc-for>\n        <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-top:16px\">\n          <button onclick=\"{{ convFalse.check }}\" style=\"background:#2f7fd1;color:#fff;border:none;border-radius:10px;padding:9px 17px;font-weight:600;font-size:14px;cursor:pointer\">Check answers<\/button>\n          <button onclick=\"{{ convFalse.reset }}\" style=\"background:#fff;color:#2a2c3a;border:1.5px solid rgba(42,44,58,.18);border-radius:10px;padding:9px 15px;font-weight:600;font-size:14px;cursor:pointer\">Reset<\/button>\n          <sc-if value=\"{{ convFalse.showResult }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"{{ convFalse.resultStyle }}\">{{ convFalse.result }}<\/span><\/sc-if>\n        <\/div>\n      <\/div>\n\n      <!-- Dialogue 2 -->\n      <div style=\"background:#fff;border:1px solid rgba(42,44,58,.1);border-left:5px solid #2f7fd1;border-radius:16px;padding:22px 24px;box-shadow:0 1px 2px rgba(30,30,60,.04),0 12px 30px -24px rgba(30,30,60,.4);margin-bottom:18px\">\n        <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:14px\">\n          <span style=\"flex:none;width:26px;height:26px;border-radius:8px;background:#2f7fd1;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:14px\">3<\/span>\n          <span style=\"font-weight:700;font-size:15px\">Read the dialogue.<\/span>\n          <span style=\"color:#8a8ea0;font-size:13.5px;font-style:italic\">At the Youth Club, in London.<\/span>\n        <\/div>\n        <sc-for list=\"{{ dialogueClub }}\" as=\"ln\" hint-placeholder-count=\"6\">\n          <div style=\"display:grid;grid-template-columns:82px 1fr;gap:12px;padding:4px 0\">\n            <div style=\"font-weight:700;color:#2f7fd1;font-size:14.5px\">{{ ln.speaker }}<\/div>\n            <div style=\"line-height:1.5;font-size:15px\">{{ ln.text }}<\/div>\n          <\/div>\n        <\/sc-for>\n      <\/div>\n\n      <!-- Ex 4: questions -->\n      <div style=\"background:#fff;border:1px solid rgba(42,44,58,.1);border-radius:16px;padding:22px 24px;box-shadow:0 1px 2px rgba(30,30,60,.04),0 12px 30px -24px rgba(30,30,60,.4);margin-bottom:18px\">\n        <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:16px\">\n          <span style=\"flex:none;width:26px;height:26px;border-radius:8px;background:#2f7fd1;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:14px\">4<\/span>\n          <span style=\"font-weight:700;font-size:15px\">Answer these questions.<\/span>\n        <\/div>\n        <sc-for list=\"{{ convQ2.items }}\" as=\"it\" hint-placeholder-count=\"3\">\n          <div style=\"padding:9px 0;border-top:1px solid rgba(42,44,58,.07)\">\n            <div style=\"font-size:15px;margin-bottom:7px\"><b style=\"color:#2f7fd1;margin-right:6px\">{{ it.n }}<\/b>{{ it.q }}<\/div>\n            <input value=\"{{ it.value }}\" oninput=\"{{ it.onInput }}\" placeholder=\"Type your answer\u2026\" style=\"width:100%;font-size:14.5px;padding:8px 11px;border:1.5px solid rgba(42,44,58,.18);border-radius:9px;background:#fff;color:#2a2c3a\">\n            <sc-if value=\"{{ it.show }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"margin-top:6px;font-size:14px;color:#2e9e6b;background:#eef7f1;border-radius:8px;padding:7px 11px\"><b>Model answer:<\/b> {{ it.answer }}<\/div><\/sc-if>\n          <\/div>\n        <\/sc-for>\n        <div style=\"display:flex;gap:10px;margin-top:16px\">\n          <button onclick=\"{{ convQ2.check }}\" style=\"background:#2f7fd1;color:#fff;border:none;border-radius:10px;padding:9px 17px;font-weight:600;font-size:14px;cursor:pointer\">Show model answers<\/button>\n          <button onclick=\"{{ convQ2.reset }}\" style=\"background:#fff;color:#2a2c3a;border:1.5px solid rgba(42,44,58,.18);border-radius:10px;padding:9px 15px;font-weight:600;font-size:14px;cursor:pointer\">Reset<\/button>\n        <\/div>\n      <\/div>\n    <\/div>\n\n    <!-- ============ GRAMMAR ============ -->\n    <div data-screen-label=\"Grammar\" style=\"{{ gramDisp }}\">\n      <div style=\"display:flex;align-items:baseline;gap:10px;margin-bottom:14px\">\n        <h2 style=\"font-family:'Bricolage Grotesque';font-weight:700;font-size:23px;margin:0;color:#20222e\">Grammar<\/h2>\n        <span style=\"color:#e0653c;font-weight:700;font-size:14px\">The verb <i>be<\/i> \u00b7 plural of nouns<\/span>\n      <\/div>\n\n      <!-- Ex 1: be table -->\n      <div style=\"background:#fff;border:1px solid rgba(42,44,58,.1);border-radius:16px;padding:22px 24px;box-shadow:0 1px 2px rgba(30,30,60,.04),0 12px 30px -24px rgba(30,30,60,.4);margin-bottom:18px\">\n        <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:6px\">\n          <span style=\"flex:none;width:26px;height:26px;border-radius:8px;background:#e0653c;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:14px\">1<\/span>\n          <span style=\"font-weight:700;font-size:15px\">Complete the grammar table for the verb <i>be<\/i>.<\/span>\n        <\/div>\n        <p style=\"margin:2px 0 16px 36px;color:#6a6d80;font-size:13.5px\">The affirmative is done for you. Write the negative (full form) and the question.<\/p>\n        <div style=\"display:grid;grid-template-columns:64px 1.1fr 1.3fr 1.1fr;gap:8px;align-items:center;font-size:13px;font-weight:700;color:#a9541f;background:#fbeee7;border-radius:10px;padding:9px 12px;margin-bottom:6px\">\n          <div><\/div><div>Affirmative<\/div><div>Negative<\/div><div>Interrogative<\/div>\n        <\/div>\n        <sc-for list=\"{{ gramBe.rows }}\" as=\"r\" hint-placeholder-count=\"7\">\n          <div style=\"display:grid;grid-template-columns:64px 1.1fr 1.3fr 1.1fr;gap:8px;align-items:start;padding:5px 12px;border-top:1px solid rgba(42,44,58,.06)\">\n            <div style=\"font-weight:700;color:#e0653c;padding-top:8px\">{{ r.p }}<\/div>\n            <div style=\"color:#5a5d70;padding-top:8px;font-size:14.5px\">{{ r.aff }}<\/div>\n            <div>\n              <input value=\"{{ r.neg.value }}\" oninput=\"{{ r.neg.onInput }}\" placeholder=\"\u2026\" style=\"width:100%;font-size:14px;padding:7px 9px;border:1.5px solid rgba(42,44,58,.18);border-radius:8px;background:#fff;color:#2a2c3a\">\n              <span style=\"{{ r.neg.markStyle }}\">{{ r.neg.mark }}<\/span>\n              <sc-if value=\"{{ r.neg.show }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"display:block;color:#2e9e6b;font-weight:700;font-size:13px;margin-top:3px\">{{ r.neg.answer }}<\/span><\/sc-if>\n            <\/div>\n            <div>\n              <input value=\"{{ r.int.value }}\" oninput=\"{{ r.int.onInput }}\" placeholder=\"\u2026?\" style=\"width:100%;font-size:14px;padding:7px 9px;border:1.5px solid rgba(42,44,58,.18);border-radius:8px;background:#fff;color:#2a2c3a\">\n              <span style=\"{{ r.int.markStyle }}\">{{ r.int.mark }}<\/span>\n              <sc-if value=\"{{ r.int.show }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"display:block;color:#2e9e6b;font-weight:700;font-size:13px;margin-top:3px\">{{ r.int.answer }}<\/span><\/sc-if>\n            <\/div>\n          <\/div>\n        <\/sc-for>\n        <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-top:16px\">\n          <button onclick=\"{{ gramBe.check }}\" style=\"background:#e0653c;color:#fff;border:none;border-radius:10px;padding:9px 17px;font-weight:600;font-size:14px;cursor:pointer\">Check answers<\/button>\n          <button onclick=\"{{ gramBe.reset }}\" style=\"background:#fff;color:#2a2c3a;border:1.5px solid rgba(42,44,58,.18);border-radius:10px;padding:9px 15px;font-weight:600;font-size:14px;cursor:pointer\">Reset<\/button>\n          <sc-if value=\"{{ gramBe.showResult }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"{{ gramBe.resultStyle }}\">{{ gramBe.result }}<\/span><\/sc-if>\n        <\/div>\n      <\/div>\n\n      <!-- Ex 2: gap fill dialogue -->\n      <div style=\"background:#fff;border:1px solid rgba(42,44,58,.1);border-radius:16px;padding:22px 24px;box-shadow:0 1px 2px rgba(30,30,60,.04),0 12px 30px -24px rgba(30,30,60,.4);margin-bottom:18px\">\n        <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:16px\">\n          <span style=\"flex:none;width:26px;height:26px;border-radius:8px;background:#e0653c;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:14px\">2<\/span>\n          <span style=\"font-weight:700;font-size:15px\">Complete the dialogue with the correct form of <i>be<\/i>.<\/span>\n        <\/div>\n        <sc-for list=\"{{ gramGap.lines }}\" as=\"ln\" hint-placeholder-count=\"8\">\n          <div style=\"display:grid;grid-template-columns:70px 1fr;gap:12px;padding:5px 0\">\n            <div style=\"font-weight:700;color:#e0653c;font-size:14.5px\">{{ ln.sp }}<\/div>\n            <div style=\"line-height:2.1;font-size:15px\">\n              <sc-for list=\"{{ ln.segs }}\" as=\"sg\">\n                <sc-if value=\"{{ sg.isText }}\" hint-placeholder-val=\"{{ true }}\"><span>{{ sg.text }}<\/span><\/sc-if>\n                <sc-if value=\"{{ sg.isGap }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"display:inline-flex;align-items:center;gap:3px\"><input value=\"{{ sg.value }}\" oninput=\"{{ sg.onInput }}\" style=\"width:62px;text-align:center;font-size:14px;padding:4px 5px;border:1.5px solid rgba(42,44,58,.22);border-radius:7px;background:#fdfaf5;color:#2a2c3a\"><span style=\"{{ sg.markStyle }}\">{{ sg.mark }}<\/span><sc-if value=\"{{ sg.show }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"color:#2e9e6b;font-weight:700;font-size:13px\">{{ sg.answer }}<\/span><\/sc-if><\/span><\/sc-if>\n              <\/sc-for>\n            <\/div>\n          <\/div>\n        <\/sc-for>\n        <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-top:16px\">\n          <button onclick=\"{{ gramGap.check }}\" style=\"background:#e0653c;color:#fff;border:none;border-radius:10px;padding:9px 17px;font-weight:600;font-size:14px;cursor:pointer\">Check answers<\/button>\n          <button onclick=\"{{ gramGap.reset }}\" style=\"background:#fff;color:#2a2c3a;border:1.5px solid rgba(42,44,58,.18);border-radius:10px;padding:9px 15px;font-weight:600;font-size:14px;cursor:pointer\">Reset<\/button>\n          <sc-if value=\"{{ gramGap.showResult }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"{{ gramGap.resultStyle }}\">{{ gramGap.result }}<\/span><\/sc-if>\n        <\/div>\n      <\/div>\n\n      <!-- Ex 3: plurals -->\n      <div style=\"background:#fff;border:1px solid rgba(42,44,58,.1);border-radius:16px;padding:22px 24px;box-shadow:0 1px 2px rgba(30,30,60,.04),0 12px 30px -24px rgba(30,30,60,.4);margin-bottom:18px\">\n        <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:6px\">\n          <span style=\"flex:none;width:26px;height:26px;border-radius:8px;background:#e0653c;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:14px\">3<\/span>\n          <span style=\"font-weight:700;font-size:15px\">Write the plural form of each noun.<\/span>\n        <\/div>\n        <p style=\"margin:2px 0 16px 36px;color:#6a6d80;font-size:13.5px\">Watch out \u2014 some plurals are irregular.<\/p>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px\">\n          <sc-for list=\"{{ gramPlural.items }}\" as=\"it\" hint-placeholder-count=\"10\">\n            <div style=\"display:flex;align-items:center;gap:8px;background:#fbf8f2;border:1px solid rgba(42,44,58,.08);border-radius:11px;padding:9px 12px\">\n              <span style=\"font-weight:700;min-width:64px;font-size:14.5px\">{{ it.s }}<\/span>\n              <span style=\"color:#c88a6b;font-weight:700\">\u2192<\/span>\n              <input value=\"{{ it.value }}\" oninput=\"{{ it.onInput }}\" placeholder=\"plural\" style=\"flex:1;min-width:0;font-size:14px;padding:6px 9px;border:1.5px solid rgba(42,44,58,.18);border-radius:8px;background:#fff;color:#2a2c3a\">\n              <span style=\"{{ it.markStyle }}\">{{ it.mark }}<\/span>\n              <sc-if value=\"{{ it.show }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"color:#2e9e6b;font-weight:700;font-size:13px\">{{ it.answer }}<\/span><\/sc-if>\n            <\/div>\n          <\/sc-for>\n        <\/div>\n        <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-top:16px\">\n          <button onclick=\"{{ gramPlural.check }}\" style=\"background:#e0653c;color:#fff;border:none;border-radius:10px;padding:9px 17px;font-weight:600;font-size:14px;cursor:pointer\">Check answers<\/button>\n          <button onclick=\"{{ gramPlural.reset }}\" style=\"background:#fff;color:#2a2c3a;border:1.5px solid rgba(42,44,58,.18);border-radius:10px;padding:9px 15px;font-weight:600;font-size:14px;cursor:pointer\">Reset<\/button>\n          <sc-if value=\"{{ gramPlural.showResult }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"{{ gramPlural.resultStyle }}\">{{ gramPlural.result }}<\/span><\/sc-if>\n        <\/div>\n      <\/div>\n    <\/div>\n\n    <!-- ============ SPEAKING ============ -->\n    <div data-screen-label=\"Speaking\" style=\"{{ vocabDisp }}\">\n      <div style=\"display:flex;align-items:baseline;gap:10px;margin-bottom:14px\">\n        <h2 style=\"font-family:'Bricolage Grotesque';font-weight:700;font-size:23px;margin:0;color:#20222e\">Speaking<\/h2>\n        <span style=\"color:#c8901f;font-weight:700;font-size:14px\">Who am I?<\/span>\n      <\/div>\n      <div style=\"background:#fff;border:1px solid rgba(42,44,58,.1);border-radius:16px;padding:24px;box-shadow:0 1px 2px rgba(30,30,60,.04),0 12px 30px -24px rgba(30,30,60,.4)\">\n        <p style=\"margin:0 0 18px;color:#6a6d80;font-size:14.5px\">Read the clues about one of the students in the table, then guess who it is.<\/p>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:18px\">\n          <sc-for list=\"{{ vocabWho.clues }}\" as=\"c\" hint-placeholder-count=\"4\">\n            <div style=\"background:#fdf6e6;border:1px solid #edd9a6;border-radius:12px;padding:11px 14px\">\n              <div style=\"font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;color:#a9791f;font-weight:700\">{{ c.l }}<\/div>\n              <div style=\"font-size:16px;font-weight:600;margin-top:2px\">{{ c.v }}<\/div>\n            <\/div>\n          <\/sc-for>\n        <\/div>\n        <div style=\"font-size:13.5px;color:#8a8ea0;margin-bottom:9px\">Who is it?<\/div>\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:10px\">\n          <sc-for list=\"{{ vocabWho.options }}\" as=\"o\" hint-placeholder-count=\"6\">\n            <button onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\">{{ o.name }}<\/button>\n          <\/sc-for>\n        <\/div>\n        <sc-if value=\"{{ vocabWho.showFb }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"margin-top:16px;font-size:15.5px;{{ vocabWho.feedbackStyle }}\">{{ vocabWho.feedback }}<\/div><\/sc-if>\n        <div style=\"margin-top:18px\">\n          <button onclick=\"{{ vocabWho.next }}\" style=\"background:#c8901f;color:#fff;border:none;border-radius:10px;padding:9px 17px;font-weight:600;font-size:14px;cursor:pointer\">New person \u2192<\/button>\n        <\/div>\n      <\/div>\n    <\/div>\n\n    <!-- ============ WRITING ============ -->\n    <div data-screen-label=\"Writing\" style=\"{{ writeDisp }}\">\n      <div style=\"display:flex;align-items:baseline;gap:10px;margin-bottom:14px\">\n        <h2 style=\"font-family:'Bricolage Grotesque';font-weight:700;font-size:23px;margin:0;color:#20222e\">Writing<\/h2>\n        <span style=\"color:#d24b86;font-weight:700;font-size:14px\">Susan's pen-friend letter<\/span>\n      <\/div>\n      <div style=\"background:#fff;border:1px solid rgba(42,44,58,.1);border-radius:16px;padding:22px 24px;box-shadow:0 1px 2px rgba(30,30,60,.04),0 12px 30px -24px rgba(30,30,60,.4)\">\n        <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:6px\">\n          <span style=\"flex:none;width:26px;height:26px;border-radius:8px;background:#d24b86;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:14px\">8<\/span>\n          <span style=\"font-weight:700;font-size:15px\">Match each part of Susan's letter to its topic.<\/span>\n        <\/div>\n        <p style=\"margin:2px 0 16px 36px;color:#6a6d80;font-size:13.5px\">Choose the correct topic for every line of the letter.<\/p>\n        <sc-for list=\"{{ writeLetter.items }}\" as=\"it\" hint-placeholder-count=\"12\">\n          <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:10px 12px;padding:9px 0;border-top:1px solid rgba(42,44,58,.07)\">\n            <span style=\"flex:none;width:24px;height:24px;border-radius:7px;background:#fbe7f0;color:#c23a75;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:13px\">{{ it.id }}<\/span>\n            <span style=\"flex:1;min-width:220px;font-size:14.5px;font-style:italic;color:#3a3d4c\">\u201c{{ it.text }}\u201d<\/span>\n            <select value=\"{{ it.value }}\" onchange=\"{{ it.onChange }}\" style=\"font-size:14px;padding:7px 10px;border:1.5px solid rgba(42,44,58,.18);border-radius:9px;background:#fff;color:#2a2c3a\">\n              <option value=\"\">\u2014 topic \u2014<\/option>\n              <sc-for list=\"{{ it.options }}\" as=\"o\"><option value=\"{{ o.v }}\">{{ o.label }}<\/option><\/sc-for>\n            <\/select>\n            <span style=\"{{ it.markStyle }}\">{{ it.mark }}<\/span>\n            <sc-if value=\"{{ it.show }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"color:#2e9e6b;font-weight:700;font-size:13.5px\">\u2192 {{ it.answer }}<\/span><\/sc-if>\n          <\/div>\n        <\/sc-for>\n        <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-top:16px\">\n          <button onclick=\"{{ writeLetter.check }}\" style=\"background:#d24b86;color:#fff;border:none;border-radius:10px;padding:9px 17px;font-weight:600;font-size:14px;cursor:pointer\">Check answers<\/button>\n          <button onclick=\"{{ writeLetter.reset }}\" style=\"background:#fff;color:#2a2c3a;border:1.5px solid rgba(42,44,58,.18);border-radius:10px;padding:9px 15px;font-weight:600;font-size:14px;cursor:pointer\">Reset<\/button>\n          <sc-if value=\"{{ writeLetter.showResult }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"{{ writeLetter.resultStyle }}\">{{ writeLetter.result }}<\/span><\/sc-if>\n        <\/div>\n      <\/div>\n    <\/div>\n\n    <div style=\"text-align:center;color:#a09a89;font-size:12.5px;margin-top:30px\">Outlook \u00b7 Student's Book \u00b7 Unit 1 \u2014 interactive edition<\/div>\n  <\/div>\n<\/div>\n<\/x-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:960,&quot;height&quot;:760},&quot;teacherMode&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Answer key&quot;,&quot;label&quot;:&quot;Reveal answer key&quot;},&quot;instantFeedback&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Answer key&quot;,&quot;label&quot;:&quot;Grade as you type&quot;}}\">\nclass Component extends DCLogic {\n  state = { active: 'conversation', ans: {}, checked: {}, whoIdx: 0, whoPick: null };\n\n  // ---------- DATA ----------\n  DHELLO = [\n    ['Nora', \"Hello! I'm Nora Drissi.\"],\n    ['Meg', \"Hi! My name's Margaret Parker. But please call me Meg.\"],\n    ['Nora', \"Nice to meet you, Meg. Who's the boy sitting behind you?\"],\n    ['Meg', \"Oh! It's my brother, Robert. Let me introduce you. Robert, this is Nora. Nora, this is Robert.\"],\n    ['Robert', \"How's everything?\"],\n    ['Nora', \"Fine. How are you?\"],\n    ['Robert', \"Pretty good, thanks.\"],\n    ['Nora', \"Are you students in this school?\"],\n    ['Meg', \"No, we're on vacation with our parents. We're from the United States. But, we'd like to learn Moroccan Arabic.\"],\n    ['Nora', \"I can teach you if you like.\"],\n    ['Robert', \"Really! I'd like that.\"],\n    ['Meg', \"Mum and Dad are impatient to learn Arabic, too.\"],\n    ['Nora', \"No problem. I can teach you everything.\"],\n    ['Meg', \"So, let's go and tell Mum and Dad.\"]\n  ];\n  DCLUB = [\n    ['Laura', \"Good afternoon everybody. I'm Laura Thompson. These are my children: Jerry, the new club manager, and his assistant\u2026\"],\n    ['Jerry', \"Yes, her name is Elizabeth, but people call her Libby. Come on. Who's who?\"],\n    ['Mehdi', \"Hello! Pleased to meet you all. I'm Mehdi.\"],\n    ['Laura', \"Jerry and Libby are friendly with the club members.\"],\n    ['Libby', \"You're most welcome, Mehdi. By the way, are you Tunisian?\"],\n    ['Laura', \"No, he isn't. He's Moroccan.\"],\n    ['Mehdi', \"Yes, and I'm here with Samira, my sister. We aren't here for long, but we're very happy to meet you all in London.\"],\n    ['Jerry', \"We're glad to welcome you to your new local Youth Club.\"]\n  ];\n  FALSE = [\n    { id: 'f1', wrong: \"Robert's full name is Robert Margaret.\", opts: ['Parker', 'Margaret', 'Drissi'], a: 'Parker' },\n    { id: 'f2', wrong: \"Margaret and Robert are students in Morocco.\", opts: ['students', 'on vacation', 'teachers'], a: 'on vacation' },\n    { id: 'f3', wrong: \"Nora is an Arabic teacher.\", opts: ['teacher', 'student', 'tourist'], a: 'student' },\n    { id: 'f4', wrong: \"Robert and Margaret are British.\", opts: ['British', 'American', 'Moroccan'], a: 'American' },\n    { id: 'f5', wrong: \"Margaret's parents can speak Arabic.\", opts: ['can', \"can't\", 'must'], a: \"can't\" }\n  ];\n  Q2 = [\n    { id: 'q1', q: \"Who is Libby?\", a: \"She is Jerry's assistant. Her real name is Elizabeth.\" },\n    { id: 'q2', q: \"Where's Mehdi from?\", a: \"He's from Morocco. He's Moroccan.\" },\n    { id: 'q3', q: \"Where's the club located?\", a: \"It's in London.\" }\n  ];\n  BEROWS = [\n    { p: 'I', aff: 'I am', neg: ['i am not', \"i'm not\"], int: ['am i'] },\n    { p: 'You', aff: 'You are', neg: ['you are not', \"you aren't\", \"you're not\"], int: ['are you'] },\n    { p: 'He', aff: 'He is', neg: ['he is not', \"he isn't\", \"he's not\"], int: ['is he'] },\n    { p: 'She', aff: 'She is', neg: ['she is not', \"she isn't\", \"she's not\"], int: ['is she'] },\n    { p: 'It', aff: 'It is', neg: ['it is not', \"it isn't\", \"it's not\"], int: ['is it'] },\n    { p: 'We', aff: 'We are', neg: ['we are not', \"we aren't\", \"we're not\"], int: ['are we'] },\n    { p: 'They', aff: 'They are', neg: ['they are not', \"they aren't\", \"they're not\"], int: ['are they'] }\n  ];\n  GAPLINES = [\n    { sp: 'Emma', segs: [{ t: 'Hello, I ' }, { b: 'g1' }, { t: ' Emma. ' }, { b: 'g2' }, { t: ' you Tom?' }] },\n    { sp: 'Tom', segs: [{ t: 'Yes, I ' }, { b: 'g3' }, { t: '. And this ' }, { b: 'g4' }, { t: ' my friend.' }] },\n    { sp: 'Emma', segs: [{ b: 'g5' }, { t: ' his name Ben?' }] },\n    { sp: 'Tom', segs: [{ t: 'No, it ' }, { b: 'g6' }, { t: '. He ' }, { b: 'g7' }, { t: ' Mike.' }] },\n    { sp: 'Emma', segs: [{ t: 'And who ' }, { b: 'g8' }, { t: ' those boys near the gate?' }] },\n    { sp: 'Tom', segs: [{ t: 'They ' }, { b: 'g9' }, { t: \" Mike's cousins. Their names \" }, { b: 'g10' }, { t: ' John and Adam.' }] },\n    { sp: 'Emma', segs: [{ b: 'g11' }, { t: ' they from London?' }] },\n    { sp: 'Mike', segs: [{ t: 'No, they ' }, { b: 'g12' }, { t: '. They ' }, { b: 'g13' }, { t: ' from Oxford.' }] }\n  ];\n  GAPANS = {\n    g1: ['am', \"'m\"], g2: ['are'], g3: ['am', \"'m\"], g4: ['is', \"'s\"], g5: ['is'], g6: [\"isn't\", 'is not'],\n    g7: ['is', \"'s\"], g8: ['are'], g9: ['are', \"'re\"], g10: ['are', \"'re\"], g11: ['are'], g12: [\"aren't\", 'are not'], g13: ['are', \"'re\"]\n  };\n  PLURALS = [\n    { id: 'p1', s: 'member', a: ['members'] }, { id: 'p2', s: 'child', a: ['children'] },\n    { id: 'p3', s: 'baby', a: ['babies'] }, { id: 'p4', s: 'foot', a: ['feet'] },\n    { id: 'p5', s: 'box', a: ['boxes'] }, { id: 'p6', s: 'knife', a: ['knives'] },\n    { id: 'p7', s: 'tooth', a: ['teeth'] }, { id: 'p8', s: 'man', a: ['men'] },\n    { id: 'p9', s: 'tomato', a: ['tomatoes'] }, { id: 'p10', s: 'book', a: ['books'] }\n  ];\n  TOPICS = [\n    { v: '1', label: 'Date' }, { v: '2', label: 'Introduction' }, { v: '3', label: 'Age' }, { v: '4', label: 'Country' },\n    { v: '5', label: 'Address' }, { v: '6', label: 'Family' }, { v: '7', label: 'School' }, { v: '8', label: 'School subjects' },\n    { v: '9', label: 'Hobbies' }, { v: '10', label: \"Susan's name\" }, { v: '11', label: 'Closing' }, { v: '12', label: 'What Susan wants' }\n  ];\n  LETTER = [\n    { id: 'a', text: 'My first name is Susan and my surname is Alban.', a: '10' },\n    { id: 'b', text: 'I go to Nuneaton High School.', a: '7' },\n    { id: 'c', text: 'Please write to me soon and tell me about yourself.', a: '12' },\n    { id: 'd', text: 'September 23rd', a: '1' },\n    { id: 'e', text: \"I'm sixteen years old.\", a: '3' },\n    { id: 'f', text: '32, Beaumont Street, Nuneaton.', a: '5' },\n    { id: 'g', text: 'I have got one sister and one brother.', a: '6' },\n    { id: 'h', text: 'I live in the Midlands, England.', a: '4' },\n    { id: 'i', text: 'Yours sincerely, Susan', a: '11' },\n    { id: 'j', text: 'I love dancing and listening to pop music.', a: '9' },\n    { id: 'k', text: 'Dear Lucas,', a: '2' },\n    { id: 'l', text: 'I study maths, history, geography and Spanish.', a: '8' }\n  ];\n  WHO = [\n    { name: 'Sam', age: '16', country: 'England', subject: 'Music', sport: 'Football' },\n    { name: 'Adil', age: '17', country: 'Egypt', subject: 'Maths', sport: 'Football' },\n    { name: 'Frank', age: '17', country: 'Scotland', subject: 'Physics', sport: 'Tennis' },\n    { name: 'Betty', age: '17', country: 'England', subject: 'Biology', sport: 'Basketball' },\n    { name: 'Hanane', age: '16', country: 'Egypt', subject: 'Physics', sport: 'Tennis' },\n    { name: 'Kate', age: '16', country: 'England', subject: 'History', sport: 'Handball' }\n  ];\n\n  // ---------- HELPERS ----------\n  norm(s) { return String(s == null ? '' : s).toLowerCase().replace(/[\u2019\u2018]/g, \"'\").replace(/[?.!,]/g, '').replace(/\\s+/g, ' ').trim(); }\n  getA(ex, k) { const e = this.state.ans[ex]; return (e && e[k] != null) ? e[k] : ''; }\n  setA(ex, k, v) { this.setState(s => ({ ans: { ...s.ans, [ex]: { ...(s.ans[ex] || {}), [k]: v } } })); }\n  check(ex) { this.setState(s => ({ checked: { ...s.checked, [ex]: true } })); }\n  reset(ex) { this.setState(s => { const a = { ...s.ans }; delete a[ex]; const c = { ...s.checked }; delete c[ex]; return { ans: a, checked: c }; }); }\n  resultShown(ex) { return !!this.state.checked[ex] || !!this.props.teacherMode; }\n  shouldMark(ex, val) {\n    if (this.props.teacherMode) return true;\n    if (this.state.checked[ex]) return true;\n    if (this.props.instantFeedback && String(val == null ? '' : val).trim() !== '') return true;\n    return false;\n  }\n  markObj(ex, ok, val) {\n    if (!this.shouldMark(ex, val)) return { mark: '', style: 'display:none' };\n    return ok\n      ? { mark: '\u2713', style: 'color:#2e9e6b;font-weight:800;font-size:15px' }\n      : { mark: '\u2717', style: 'color:#d64545;font-weight:800;font-size:15px' };\n  }\n  pill(all) {\n    return 'display:inline-block;padding:5px 13px;border-radius:999px;font-weight:700;font-size:13px;background:'\n      + (all ? '#e5f4ec' : '#fbeecd') + ';color:' + (all ? '#2e9e6b' : '#9a6a12');\n  }\n  matches(acc, val) { const n = this.norm(val); return acc.some(a => this.norm(a) === n); }\n  topicLabel(v) { const t = this.TOPICS.find(x => x.v === v); return t ? t.label : ''; }\n\n  renderVals() {\n    const A = this.state.active;\n    const tabsDef = [\n      ['conversation', 'Conversation', '#2f7fd1'],\n      ['grammar', 'Grammar', '#e0653c'],\n      ['vocabulary', 'Speaking', '#c8901f'],\n      ['writing', 'Writing', '#d24b86']\n    ];\n    const tabs = tabsDef.map(([id, label, c]) => {\n      const on = A === id;\n      const skin = on\n        ? 'background:' + c + ';color:#fff;border:1.5px solid ' + c + ';box-shadow:0 8px 18px -10px ' + c\n        : 'background:#fff;color:' + c + ';border:1.5px solid ' + c + '55';\n      return {\n        id, label, dot: on ? '#ffffff' : c,\n        onClick: () => this.setState({ active: id }),\n        style: 'display:inline-flex;align-items:center;gap:8px;padding:10px 17px;border-radius:999px;font-weight:700;font-size:14.5px;cursor:pointer;transition:all .15s;' + skin\n      };\n    });\n    const disp = id => 'display:' + (A === id ? 'block' : 'none');\n\n    // Conversation \u2014 false info\n    const cF = this.resultShown('false');\n    let fScore = 0;\n    const falseItems = this.FALSE.map(it => {\n      const v = this.getA('false', it.id); const ok = v === it.a; if (ok) fScore++;\n      const m = this.markObj('false', ok, v);\n      return {\n        wrong: it.wrong, value: v, options: it.opts.map(o => ({ v: o, label: o })),\n        onChange: e => this.setA('false', it.id, e.target.value),\n        mark: m.mark, markStyle: m.style, showAns: this.shouldMark('false', v) && !ok, answer: it.a\n      };\n    });\n    const convFalse = {\n      items: falseItems, check: () => this.check('false'), reset: () => this.reset('false'),\n      showResult: cF, result: fScore + ' / ' + this.FALSE.length + ' correct', resultStyle: this.pill(fScore === this.FALSE.length)\n    };\n\n    // Conversation \u2014 Q&A\n    const cQ = this.resultShown('q2');\n    const convQ2 = {\n      items: this.Q2.map((it, i) => ({\n        n: i + 1, q: it.q, value: this.getA('q2', it.id),\n        onInput: e => this.setA('q2', it.id, e.target.value), answer: it.a, show: cQ\n      })),\n      check: () => this.check('q2'), reset: () => this.reset('q2')\n    };\n\n    // Grammar \u2014 be table\n    let bScore = 0, bTotal = 0;\n    const cell = (kind, key, acc) => {\n      bTotal++; const v = this.getA('be', key); const ok = this.matches(acc, v); if (ok) bScore++;\n      const m = this.markObj('be', ok, v);\n      return { value: v, onInput: e => this.setA('be', key, e.target.value), mark: m.mark, markStyle: m.style, show: this.shouldMark('be', v) && !ok, answer: acc[0] };\n    };\n    const beRows = this.BEROWS.map(r => ({\n      p: r.p, aff: r.aff,\n      neg: cell('neg', r.p + '_neg', r.neg),\n      int: cell('int', r.p + '_int', r.int)\n    }));\n    const gramBe = {\n      rows: beRows, check: () => this.check('be'), reset: () => this.reset('be'),\n      showResult: this.resultShown('be'), result: bScore + ' / ' + bTotal + ' correct', resultStyle: this.pill(bScore === bTotal)\n    };\n\n    // Grammar \u2014 gap fill\n    let gScore = 0; const gTotal = Object.keys(this.GAPANS).length;\n    const gapLines = this.GAPLINES.map(line => ({\n      sp: line.sp,\n      segs: line.segs.map(seg => {\n        if (seg.t != null) return { isText: true, isGap: false, text: seg.t };\n        const acc = this.GAPANS[seg.b]; const v = this.getA('gap', seg.b); const ok = this.matches(acc, v); if (ok) gScore++;\n        const m = this.markObj('gap', ok, v);\n        return { isText: false, isGap: true, value: v, onInput: e => this.setA('gap', seg.b, e.target.value), mark: m.mark, markStyle: m.style, show: this.shouldMark('gap', v) && !ok, answer: acc[0] };\n      })\n    }));\n    const gramGap = {\n      lines: gapLines, check: () => this.check('gap'), reset: () => this.reset('gap'),\n      showResult: this.resultShown('gap'), result: gScore + ' / ' + gTotal + ' correct', resultStyle: this.pill(gScore === gTotal)\n    };\n\n    // Grammar \u2014 plurals\n    let pScore = 0;\n    const pluralItems = this.PLURALS.map(it => {\n      const v = this.getA('plural', it.id); const ok = this.matches(it.a, v); if (ok) pScore++;\n      const m = this.markObj('plural', ok, v);\n      return { s: it.s, value: v, onInput: e => this.setA('plural', it.id, e.target.value), mark: m.mark, markStyle: m.style, show: this.shouldMark('plural', v) && !ok, answer: it.a[0] };\n    });\n    const gramPlural = {\n      items: pluralItems, check: () => this.check('plural'), reset: () => this.reset('plural'),\n      showResult: this.resultShown('plural'), result: pScore + ' / ' + this.PLURALS.length + ' correct', resultStyle: this.pill(pScore === this.PLURALS.length)\n    };\n\n    // Speaking \u2014 Who am I?\n    const w = this.WHO[this.state.whoIdx]; const pick = this.state.whoPick;\n    const whoClues = [['Age', w.age], ['Country', w.country], [ t: () => this.reset('letter'),\n      showResult: cL, result: lScore + ' / ' + this.LETTER.length + ' correct', resultStyle: this.pill(lScore === this.LETTER.length)\n    };\n\n    return {\n      tabs,\n      convDisp: disp('conversation'), gramDisp: disp('grammar'), vocabDisp: disp('vocabulary'), writeDisp: disp('writing'),\n      dialogueHello: this.DHELLO.map(l => ({ speaker: l[0], text: l[1] })),\n      dialogueClub: this.DCLUB.map(l => ({ speaker: l[0], text: l[1] })),\n      convFalse, convQ2, gramBe, gramGap, gramPlural, vocabWho, writeLetter\n    };\n  }\n}\n<\/script>\n\n\n<div id=\"eq-footer\" style=\"max-width:980px;margin:0 auto 30px;padding:0 10px;text-align:center\"><button id=\"eq-finish\" class=\"eq-btn\" style=\"width:100%;max-width:560px;font-size:17px;padding:16px;background:linear-gradient(160deg,#0ea5e9,#2563eb);box-shadow:0 6px 0 #075985;border-radius:20px\">\u2705 I finished this lesson!<\/button><div id=\"eq-next\" style=\"display:none;margin-top:12px\"><div style=\"color:#4ade80;font-weight:800;font-size:15px;margin-bottom:10px\">\ud83c\udf89 Great job! Lesson complete \u2014 saved!<\/div><a href=\"./unit1-dungeon.html#practice\" class=\"eq-btn\" style=\"background:linear-gradient(160deg,#22c55e,#059669);box-shadow:0 5px 0 #14532d;font-size:15px;padding:13px 22px;border-radius:16px\">\u270f\ufe0f Next: Practice with Wizzy \u2192<\/a><\/div><\/div><script id=\"eq-logic\">(function(){var on=false,cur=null;function best(){var vs=(speechSynthesis.getVoices()||[]).filter(function(v){return v.lang&&v.lang.indexOf(\"en\")===0});function sc(v){var n=v.name+\" \"+v.lang;return (/natural|neural/i.test(n)?8:0)+(/google/i.test(n)?4:0)+(/online/i.test(n)?2:0)+(/female|GB|UK/i.test(n)?1:0)}vs.sort(function(a,b){return sc(b)-sc(a)});return vs[0]}function speak(el){try{speechSynthesis.cancel();if(cur)cur.classList.remove(\"eq-speaking\");var t=(el.innerText||\"\").replace(/\\s+/g,\" \").trim();if(t.length<2||t.length>800)return;var u=new SpeechSynthesisUtt
